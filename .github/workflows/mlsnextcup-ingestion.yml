name: MLS Next Cup Ingestion

on:
  schedule:
    - cron: '0 8 * * *'  # Daily at 8:00 UTC (4:00 AM EDT)
  workflow_dispatch:

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Check date range
        id: check
        run: |
          DATE_EDT=$(TZ="America/New_York" date +%Y-%m-%d)
          echo "date_edt=$DATE_EDT" >> $GITHUB_OUTPUT
          if [[ "$DATE_EDT" < "2026-05-19" || "$DATE_EDT" > "2026-06-04" ]]; then
            echo "Outside MLS Next Cup window ($DATE_EDT) — skipping."
            echo "skip=true" >> $GITHUB_OUTPUT
          else
            echo "Within MLS Next Cup window ($DATE_EDT) — running."
            echo "skip=false" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        if: steps.check.outputs.skip == 'false'
        uses: actions/checkout@v4

      - name: Login to Azure (OIDC)
        if: steps.check.outputs.skip == 'false'
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Setup .NET
        if: steps.check.outputs.skip == 'false'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.100'

      - name: Restore dependencies
        if: steps.check.outputs.skip == 'false'
        run: dotnet restore YSS.Verification/YSS.Verification.csproj

      - name: Run MLS Next Cup ingestion
        if: steps.check.outputs.skip == 'false'
        run: dotnet run --project YSS.Verification -- --event 87 "${{ secrets.MODULAR11_SESSION_TOKEN }}"
