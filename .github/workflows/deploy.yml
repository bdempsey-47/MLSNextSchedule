name: Build and Deploy to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_FUNCTIONAPP_NAME: 'yss-func-prod'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './YSS.Functions'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test YSS.Tests/YSS.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Deploy to Azure Functions
    if: success()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Azure Functions
        run: dotnet build ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} --configuration Release --no-restore

      - name: Publish Azure Functions
        run: dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} --configuration Release --output ./output

      - name: Install EF Core CLI Tool
        run: dotnet tool install --global dotnet-ef

      - name: Generate EF Migration Scripts
        run: dotnet ef migrations script --project YSS.Data --configuration Release --output ./migrations.sql --idempotent

      - name: Apply Migrations to Azure SQL via CLI
        run: |
          az sql db run --resource-group application-prod --server yss-sql-prod --name yss-prod --sql-file ./migrations.sql

      - name: Deploy to Azure Functions with Azure CLI
        run: |
          cd ./output
          zip -r ../function-app.zip .
          cd ..
          az functionapp deployment source config-zip --resource-group application-prod --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --src function-app.zip
