name: Build and Deploy to Azure Functions

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  DOTNET_VERSION: '10.0.x'
  AZURE_FUNCTIONAPP_NAME: 'yss-func-prod'
  AZURE_FUNCTIONAPP_PACKAGE_PATH: './YSS.Functions'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    name: Build and Test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build solution
        run: dotnet build --configuration Release --no-restore

      - name: Run tests
        run: dotnet test YSS.Tests/YSS.Tests.csproj --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test-results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test-results.trx'

  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    name: Deploy to Azure Functions
    if: success()
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Azure using OIDC
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          allow-no-subscriptions: true

      - name: Setup .NET ${{ env.DOTNET_VERSION }}
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore dependencies
        run: dotnet restore

      - name: Build Azure Functions
        run: dotnet build ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} --configuration Release --no-restore

      - name: Publish Azure Functions
        run: dotnet publish ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }} --configuration Release --output ./output

      - name: Install EF Core CLI Tool
        run: dotnet tool install --global dotnet-ef

      - name: Get SQL Access Token
        id: sql-token
        run: |
          TOKEN=$(az account get-access-token --resource https://database.windows.net --query accessToken -o tsv)
          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Build SQL Connection String with OIDC Token
        id: sql-conn
        run: |
          CONN_STR="Server=tcp:yss-sql-prod.database.windows.net,1433;Initial Catalog=yss-prod;User ID=github-actions-oidc;Password=${{ steps.sql-token.outputs.token }};Encrypt=True;TrustServerCertificate=False;Connection Timeout=30;"
          echo "connection_string=$CONN_STR" >> $GITHUB_OUTPUT

      - name: Apply EF Migrations to Azure SQL
        run: dotnet ef database update --project YSS.Data --configuration Release -- "${{ steps.sql-conn.outputs.connection_string }}"

      - name: Deploy to Azure Functions with Azure CLI
        run: |
          cd ./output
          zip -r ../function-app.zip .
          cd ..
          az functionapp deployment source config-zip --resource-group application-prod --name ${{ env.AZURE_FUNCTIONAPP_NAME }} --src function-app.zip
